<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAHUE Aurora Hero</title>
<style>
  :root {
    color-scheme: light;
    --white: rgba(255, 249, 245, 0.72);
    --glow: rgba(255, 255, 255, 0.36);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
  }

  body {
    overflow: hidden;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5c259;
  }

  .hero {
    position: relative;
    width: 100vw;
    height: 100svh;
    min-height: 620px;
    display: grid;
    place-items: center;
    isolation: isolate;
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 26%, rgba(224, 247, 74, 0.92) 0 12%, transparent 34%),
      radial-gradient(circle at 52% 20%, rgba(255, 95, 61, 0.86) 0 18%, transparent 42%),
      radial-gradient(circle at 80% 28%, rgba(231, 248, 51, 0.82) 0 13%, transparent 38%),
      radial-gradient(circle at 76% 78%, rgba(143, 139, 205, 0.76) 0 17%, transparent 42%),
      radial-gradient(circle at 34% 84%, rgba(255, 171, 75, 0.9) 0 20%, transparent 45%),
      linear-gradient(135deg, #d9e84f 0%, #ffb855 34%, #ff704b 50%, #e2d754 73%, #a8a0d7 100%);
    background-position:
      0% 20%,
      52% 16%,
      100% 24%,
      88% 82%,
      20% 90%,
      50% 50%;
    background-size:
      130% 130%,
      145% 145%,
      140% 140%,
      150% 150%,
      135% 135%,
      220% 220%;
    animation: aurora-base 12s ease-in-out infinite alternate;
  }

  .hero::before,
  .hero::after {
    content: "";
    position: absolute;
    inset: -24%;
    z-index: -2;
    filter: blur(54px) saturate(1.24);
    transform-origin: 50% 50%;
    will-change: transform, opacity;
  }

  .hero::before {
    background:
      radial-gradient(circle at 15% 42%, rgba(205, 239, 54, 0.88) 0 14%, transparent 32%),
      radial-gradient(circle at 46% 32%, rgba(255, 100, 65, 0.92) 0 18%, transparent 42%),
      radial-gradient(circle at 86% 38%, rgba(236, 255, 68, 0.78) 0 15%, transparent 35%),
      radial-gradient(circle at 70% 76%, rgba(159, 143, 202, 0.7) 0 16%, transparent 38%),
      radial-gradient(circle at 28% 72%, rgba(255, 184, 79, 0.92) 0 18%, transparent 42%);
    animation: aurora-drift 12s ease-in-out infinite alternate;
  }

  .hero::after {
    z-index: -1;
    background:
      conic-gradient(from 130deg at 50% 50%,
        rgba(255, 241, 127, 0.42),
        rgba(255, 118, 84, 0.32),
        rgba(168, 163, 214, 0.38),
        rgba(222, 244, 83, 0.34),
        rgba(255, 184, 85, 0.38),
        rgba(255, 241, 127, 0.42));
    mix-blend-mode: soft-light;
    opacity: 0.84;
    animation: aurora-turn 18s linear infinite;
  }

  .grain {
    position: absolute;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(circle at center, rgba(0,0,0,0.4), transparent 74%);
    animation: grain-float 16s ease-in-out infinite alternate;
  }

  h1 {
    margin: 0;
    color: transparent;
    -webkit-text-stroke: clamp(1.4px, 0.26vw, 3.6px) var(--white);
    text-stroke: clamp(1.4px, 0.26vw, 3.6px) var(--white);
    font-size: clamp(76px, 16vw, 230px);
    font-weight: 900;
    line-height: 0.82;
    letter-spacing: 0;
    text-align: center;
    text-transform: uppercase;
    text-shadow:
      0 0 32px var(--glow),
      0 24px 90px rgba(255, 255, 255, 0.18);
    animation: title-glow 5.5s ease-in-out infinite alternate;
  }

  h1 span {
    display: inline-block;
    font-family: "Arial Black", Impact, system-ui, sans-serif;
    transform: scaleX(1.18);
  }

  @keyframes aurora-base {
    0% {
      background-position:
        0% 20%,
        52% 16%,
        100% 24%,
        88% 82%,
        20% 90%,
        50% 50%;
      filter: saturate(1.08) brightness(1.02);
    }
    45% {
      background-position:
        18% 12%,
        42% 32%,
        82% 18%,
        74% 72%,
        34% 76%,
        70% 42%;
      filter: saturate(1.22) brightness(1.06);
    }
    100% {
      background-position:
        10% 42%,
        62% 24%,
        88% 46%,
        62% 86%,
        12% 68%,
        28% 70%;
      filter: saturate(1.14) brightness(1.04);
    }
  }

  @keyframes aurora-drift {
    0% {
      transform: translate3d(-7%, -4%, 0) scale(1.04) rotate(-5deg);
      opacity: 0.86;
    }
    35% {
      transform: translate3d(8%, -8%, 0) scale(1.14) rotate(6deg);
      opacity: 1;
    }
    70% {
      transform: translate3d(-4%, 9%, 0) scale(1.1) rotate(-3deg);
      opacity: 0.9;
    }
    100% {
      transform: translate3d(10%, 5%, 0) scale(1.18) rotate(8deg);
      opacity: 0.98;
    }
  }

  @keyframes aurora-turn {
    to {
      transform: rotate(360deg) scale(1.08);
    }
  }

  @keyframes grain-float {
    to {
      transform: translate3d(-18px, 14px, 0);
      opacity: 0.72;
    }
  }

  @keyframes title-glow {
    to {
      -webkit-text-stroke-color: rgba(255, 252, 244, 0.9);
      text-stroke-color: rgba(255, 252, 244, 0.9);
      text-shadow:
        0 0 46px rgba(255, 255, 255, 0.46),
        0 28px 110px rgba(255, 255, 255, 0.26);
    }
  }

  @media (max-width: 640px) {
    .hero {
      min-height: 520px;
    }

    h1 {
      font-size: clamp(58px, 21vw, 116px);
    }

    h1 span {
      transform: scaleX(1.08);
    }
  }
</style>
</head>
<body>
  <main class="hero" aria-label="Animated aurora gradient hero">
    <div class="grain" aria-hidden="true"></div>
    <h1><span>VAHUE</span></h1>
  </main>
</body>
</html>
